<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>About Us | Alkhidmat Foundation Gujrat</title>

    <meta name="description"
        content="Learn about Alkhidmat Foundation Gujrat, our mission, vision, values, and commitment to serving humanity through sustainable welfare initiatives.">

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/pages/gallery.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">

</head>

<body>

    <!-- NAVBAR COMPONENT -->
    <div id="navbar"></div>

    <!-- ==========================================
         MAIN CONTENT
    ========================================== -->

    <main>
        <!-- HERO -->

        <section class="page-hero">

            <div class="page-hero-overlay"></div>

            <div class="container page-hero-content">

                <h1>Gallery</h1>

                <p>
                    Capturing moments of service, compassion,
                    community development and humanitarian work.
                </p>

            </div>

        </section>

        <!-- FILTERS -->

        <section class="gallery-filters">

            <div class="container">

                <div class="filter-buttons">

                    <button class="active">All</button>
                    <button>Health</button>
                    <button>Education</button>
                    <button>Relief</button>
                    <button>Events</button>

                </div>

            </div>

        </section>

        <!-- GALLERY -->

        <section class="gallery-page">

            <div class="container">

                <div class="gallery-masonry">

                    <div class="gallery-item large">
                        <img src="../assets/images/gallery/gallery1.jpg" alt="">

                    <div class="gallery-item">
                        <img src="../assets/images/gallery/gallery2.jpg" alt="">
                    </div>

                    <div class="gallery-item">
                        <img src="../assets/images/gallery/gallery3.jpg" alt="">

                    <div class="gallery-item large">
                        <img src="../assets/images/gallery/gallery4.jpg" alt="">
                    </div>

                    <div class="gallery-item">
                        <img src="../assets/images/gallery/gallery5.jpg" alt="">
                    </div>

                    <div class="gallery-item">
                        <img src="../assets/images/gallery/gallery6.jpg" alt="">
                    </div>

                    <div class="gallery-item large">
                        <img src="../assets/images/gallery/gallery7.jpg" alt="">
                    </div>

                    <div class="gallery-item">
                        <img src="../assets/images/gallery/gallery8.jpg" alt="">
                    </div>

                </div>

                <div class="gallery-load-more">

                    <a href="#" class="btn btn-primary">
                        Load More
                    </a>

                </div>

            </div>

        </section>
    </main>
    <!-- FOOTER COMPONENT -->
    <div id="footer"></div>

    <!-- JS -->



    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/components.js"></script>

    <script>
        loadComponent("navbar", "../components/navbar.html");
        loadComponent("footer", "../components/footer.html");
    </script>

    <script src="../assets/js/slider.js"></script>

    <script src="../assets/js/counters.js"></script>
